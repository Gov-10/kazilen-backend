global:
  scrape_interval: 15s

scrape_configs:
  - job_name: booking-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - booking-service:7000

  - job_name: customer-service
    metrics_path: /customers/metrics
    static_configs:
      - targets:
          - customer-service:7001

  - job_name: worker-service
    metrics_path: /workers/metrics
    static_configs:
      - targets:
          - worker-service:7002

  - job_name: otel-collector-metrics
    static_configs:
      - targets:
          - otel-collector:8889
